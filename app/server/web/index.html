<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="gateway-prefix" content="/app/fn-wireguard">
<title>WireGuard</title>
<style>
*,::before,::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft YaHei","PingFang SC","Hiragino Sans GB",sans-serif;font-size:14px;color:#303133;background:#f5f7fa;line-height:1.6}
.container{max-width:1100px;margin:0 auto;padding:24px 20px}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.topbar h1{font-size:22px;font-weight:700;color:#303133}
.toggle-group{display:flex;align-items:center;gap:12px}
.status-pill{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600}
.status-pill.on{background:#e6f4ea;color:#137333}
.status-pill.off{background:#fce8e6;color:#c5221f}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot.on{background:#34a853}
.dot.off{background:#ea4335}
.iface-info{display:flex;gap:24px;flex-wrap:wrap;margin-bottom:16px;font-size:12px;color:#64748b}
.iface-info span strong{color:#303133}
.btn{display:inline-block;padding:8px 18px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;transition:.15s;white-space:nowrap}
.btn-primary{background:#2563eb;color:#fff}
.btn-primary:hover{background:#1d4ed8}
.btn-danger{background:#dc3545;color:#fff}
.btn-danger:hover{background:#bb2d3b}
.btn-outline{background:transparent;color:#2563eb;border:1px solid #2563eb}
.btn-outline:hover{background:#e8f0fe}
.btn-sm{padding:5px 12px;font-size:12px}
.card{background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:16px}
.card-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid #ebeef5}
.card-header h2{font-size:15px;font-weight:600}
.card-body{padding:0}
table{width:100%;border-collapse:collapse}
th{padding:12px 16px;text-align:left;font-size:12px;color:#909399;border-bottom:1px solid #ebeef5;white-space:nowrap}
td{padding:12px 16px;border-bottom:1px solid #f5f5f5;font-size:13px}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafbfc}
.empty-row td{text-align:center;padding:40px 16px;color:#909399;font-size:13px}
.mono{font-family:ui-monospace,"SF Mono","Cascadia Code","Consolas",monospace;font-size:11px;word-break:break-all}
.row-actions{display:flex;gap:4px}
.icon-btn{background:none;border:none;color:#909399;cursor:pointer;padding:4px 8px;border-radius:4px;font-size:13px;transition:.15s}
.icon-btn:hover{color:#303133;background:#f0f2f5}
.icon-btn.danger:hover{color:#dc3545;background:#fce8e6}

.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:20px}
.settings-grid .full{grid-column:1/-1}
.setting-item label{display:block;font-size:12px;color:#64748b;margin-bottom:4px}
.setting-item input,.setting-item textarea{width:100%;padding:8px 10px;border:1px solid #dcdfe6;border-radius:6px;font-size:13px;font-family:inherit;color:#303133;transition:border-color .15s}
.setting-item input:focus,.setting-item textarea:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 2px rgba(37,99,235,.1)}
.setting-item textarea{resize:vertical;min-height:50px;font-family:ui-monospace,monospace}
.settings-actions{padding:0 20px 20px;display:flex;gap:8px}

.setting-item-readonly{display:flex;align-items:center;gap:8px;font-size:12px}
.setting-item-readonly label{color:#64748b;white-space:nowrap}
.setting-item-readonly span{color:#303133}

.collapse-toggle{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
.collapse-toggle .arrow{transition:transform .2s;font-size:10px;color:#909399}
.collapse-toggle.open .arrow{transform:rotate(90deg)}
.collapse-body{display:none}
.collapse-body.open{display:block}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:#fff;border-radius:10px;padding:28px;width:90%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 30px rgba(0,0,0,.15)}
.modal h3{margin-bottom:20px;font-size:18px;font-weight:600}
.modal .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.modal .form-group{margin-bottom:14px}
.modal .form-group label{display:block;margin-bottom:4px;font-size:12px;color:#64748b;font-weight:500}
.modal .form-group input,.modal .form-group textarea{width:100%;padding:8px 10px;border:1px solid #dcdfe6;border-radius:6px;font-size:13px;font-family:inherit;color:#303133}
.modal .form-group input:focus,.modal .form-group textarea:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 2px rgba(37,99,235,.1)}
.modal .form-group textarea{resize:vertical;min-height:40px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}

.toast{position:fixed;bottom:24px;right:24px;padding:12px 22px;border-radius:8px;color:#fff;font-size:13px;z-index:200;animation:fadeIn .3s;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.toast-success{background:#34a853}
.toast-error{background:#ea4335}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:640px){.settings-grid{grid-template-columns:1fr}.modal .form-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container" id="app"></div>
<div id="toast-container"></div>
<script src="app.js"></script>
</body>
</html>
